version = "run_v1"
description = "Standard run directory format for real-device and simulation data."

[layout]
runs_dir = "data/runs"
run_directory_pattern = "<run_id>"
required_files = ["metadata.csv", "send_log.csv"]
derived_files = [
  "calculated_Cycle_data.csv",
  "phase_gap_error.csv",
  "carrier_sense_log.csv",
]

[[files.metadata.columns]]
name = "run_id"
type = "string"
required = true
description = "Unique run identifier."

[[files.metadata.columns]]
name = "coupling_strength"
type = "integer"
required = true
description = "Coupling strength parameter."

[[files.metadata.columns]]
name = "strength_ratio"
type = "float"
required = false
aliases = ["strengrh_ratio"]
description = "Scale factor used for phase correction. The alias keeps compatibility with older generated metadata."

[[files.metadata.columns]]
name = "coupling_function"
type = "string"
required = true
description = "Coupling function name, for example KURAMOTO, LINEAR, or NewSIN."

[[files.metadata.columns]]
name = "cycle_time"
type = "float"
required = true
unit = "ms"
description = "One oscillator cycle length."

[[files.metadata.columns]]
name = "listening_rate"
type = "float"
required = true
unit = "percent"
description = "Awake/listening percentage in one cycle."

[[files.metadata.columns]]
name = "start_timing_mode"
type = "string"
required = false
description = "Start-timing mode: random or fixed."

[[files.metadata.columns]]
name = "random_sampling_method"
type = "string"
required = false
description = "Random start sampling method. uniform_without_replacement samples unique candidates with equal probability."

[[files.metadata.columns]]
name = "random_seed"
type = "integer"
required = false
description = "Seed used by the random start generator for this simulation request."

[[files.metadata.columns]]
name = "random_run_index"
type = "integer"
required = false
description = "Zero-based run index in the random sequence generated from random_seed."

[[files.metadata.columns]]
name = "random_start_min"
type = "integer"
required = false
unit = "ms"
description = "Minimum candidate start time for random mode; inclusive."

[[files.metadata.columns]]
name = "random_start_max"
type = "integer"
required = false
unit = "ms"
description = "Maximum candidate start time for random mode; inclusive."

[[files.metadata.columns]]
name = "start_step"
type = "integer"
required = false
unit = "ms"
description = "Spacing between candidate start times in random mode."

[[files.metadata.columns]]
name = "start_step_count"
type = "integer"
required = false
description = "Number of steps from random_start_min to random_start_max."

[[files.metadata.columns]]
name = "random_start_candidate_count"
type = "integer"
required = false
description = "Number of candidate start times; start_step_count + 1."

[[files.metadata.columns]]
name = "selected_start_times"
type = "list[integer]"
required = false
separator = ";"
unit = "ms"
description = "Actual start times selected for devices in this run."

[[files.metadata.columns]]
name = "simulation_mode"
type = "string"
required = false
description = "Simulation mode. standard keeps legacy point-send behavior; per_measurement enables carrier sense and LoRa airtime."

[[files.metadata.columns]]
name = "carrier_sense_duration_ms"
type = "float"
required = false
unit = "ms"
description = "Carrier-sense duration used before the scheduled send. 0 in config means auto, stored metadata contains the effective value."

[[files.metadata.columns]]
name = "transmission_time_ms"
type = "float"
required = false
unit = "ms"
description = "Packet airtime used as the transmission occupation width."

[[files.metadata.columns]]
name = "lora_payload_bytes"
type = "integer"
required = false
unit = "bytes"
description = "LoRa payload size used to calculate airtime."

[[files.metadata.columns]]
name = "lora_spreading_factor"
type = "integer"
required = false
description = "LoRa spreading factor used to calculate airtime."

[[files.metadata.columns]]
name = "lora_bandwidth_hz"
type = "integer"
required = false
unit = "Hz"
description = "LoRa bandwidth used to calculate airtime."

[[files.metadata.columns]]
name = "lora_coding_rate_denominator"
type = "integer"
required = false
description = "LoRa coding-rate denominator. 5 means 4/5, 8 means 4/8."

[[files.metadata.columns]]
name = "lora_preamble_symbols"
type = "integer"
required = false
description = "LoRa preamble length in symbols."

[[files.metadata.columns]]
name = "lora_explicit_header"
type = "string"
required = false
description = "Whether explicit header mode was used for LoRa airtime calculation."

[[files.metadata.columns]]
name = "lora_crc_enabled"
type = "string"
required = false
description = "Whether CRC was included in LoRa airtime calculation."

[[files.metadata.columns]]
name = "lora_low_data_rate_optimize"
type = "string"
required = false
description = "Resolved low-data-rate optimization flag used for LoRa airtime calculation."

[[files.metadata.columns]]
name = "tags"
type = "list[string]"
required = false
separator = ";"
description = "Semicolon-separated tags such as real, generated, 20dai, sec, or hex."

[[files.metadata.columns]]
name = "ranges"
type = "list[range]"
required = false
separator = "|"
description = "Optional start:end:device_id ranges for simulation sources."

[[files.send_log.columns]]
name = "time"
type = "float"
required = true
unit = "ms"
description = "Send timestamp. If metadata tags contain sec, readers convert seconds to milliseconds."

[[files.send_log.columns]]
name = "oscillator_id"
type = "string"
required = true
description = "Oscillator or device id. If metadata tags contain hex, readers convert hex ids to integers for analysis."

[[files.send_log.columns]]
name = "send_count"
type = "integer"
required = false
description = "Sequential send count for simulation logs."

[[files.send_log.columns]]
name = "transmission_end_time"
type = "float"
required = false
unit = "ms"
description = "End timestamp of the simulated packet airtime."

[[files.send_log.columns]]
name = "transmission_time_ms"
type = "float"
required = false
unit = "ms"
description = "Packet airtime width used for this send."

[[files.carrier_sense_log.columns]]
name = "time"
type = "float"
required = true
unit = "ms"
description = "Scheduled send timestamp where carrier sense was evaluated."

[[files.carrier_sense_log.columns]]
name = "oscillator_id"
type = "string"
required = true
description = "Oscillator or device id."

[[files.carrier_sense_log.columns]]
name = "action"
type = "string"
required = true
description = "send_clear when transmission occurred, skip_busy when carrier sense suppressed the send."

[[files.carrier_sense_log.columns]]
name = "carrier_sense_start"
type = "float"
required = false
unit = "ms"
description = "Start of the carrier-sense window."

[[files.carrier_sense_log.columns]]
name = "carrier_sense_end"
type = "float"
required = false
unit = "ms"
description = "End of the carrier-sense window."

[[files.carrier_sense_log.columns]]
name = "blocking_oscillator_id"
type = "string"
required = false
description = "Device whose transmission made the channel busy."

[[files.carrier_sense_log.columns]]
name = "blocking_transmission_start"
type = "float"
required = false
unit = "ms"
description = "Start time of the blocking transmission."

[[files.carrier_sense_log.columns]]
name = "blocking_transmission_end"
type = "float"
required = false
unit = "ms"
description = "End time of the blocking transmission."

[[files.calculated_cycle_data.columns]]
name = "cycle_index"
type = "integer"
required = true
description = "1-based cycle index."

[[files.calculated_cycle_data.columns]]
name = "cycle_start_time"
type = "float"
required = true
unit = "ms"
description = "Reference cycle start timestamp."

[[files.calculated_cycle_data.columns]]
name = "is_original_cycle"
type = "boolean"
required = true
description = "True when the reference cycle was observed, false when filled."

[[files.calculated_cycle_data.columns]]
name = "reference_id"
type = "integer"
required = true
description = "Reference oscillator id used for cycle alignment."

[[files.phase_gap_error.columns]]
name = "cycle_index"
type = "integer"
required = true
description = "1-based cycle index."

[[files.phase_gap_error.columns]]
name = "mean_abs_diff_from_ideal_phase_gap"
type = "float"
required = false
description = "Mean absolute phase-gap error in radians."

[[files.phase_gap_error.columns]]
name = "mean_abs_diff_from_ideal_phase_gap_ratio"
type = "float"
required = false
description = "Phase-gap error divided by the ideal phase gap."
