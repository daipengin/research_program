[paths]
data_format_config = "configs/data_format/run_v1.toml"
runs_dirs = ["data/runs"]
aggregated_dirs = ["data/aggregated"]
figure_dirs = [
  "outputs/figures",
]
simulation_config = "configs/experiments/default_simulation.toml"

[filters]
numeric_fields = [
  "coupling_strength",
  "strength_ratio",
  "cycle_time",
  "listening_rate",
]
categorical_fields = ["coupling_function"]
tag_field = "tags"

[figures]
extensions = [".png", ".jpg", ".jpeg", ".webp", ".pdf", ".svg"]
raster_download_formats = ["png", "jpeg", "webp"]
generated_graph_formats = ["pdf", "png", "svg"]
