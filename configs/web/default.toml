[paths]
data_format_config = "configs/data_format/run_v1.toml"
runs_dirs = ["data/runs", "make_simulation_data/results"]
aggregated_dirs = ["data/aggregated", "make_simulation_data/aggregated_stats"]
figure_dirs = [
  "outputs/figures",
  "make_simulation_data/aggregated_stats_graphs",
  "make_simulation_data/aggregated_stats_overlay_graphs",
  "make_simulation_data/per_aligned_graphs",
  "make_simulation_data/phase_gap_error_graphs",
]
simulation_config = "configs/experiments/default_simulation.toml"

[filters]
numeric_fields = [
  "coupling_strength",
  "strength_ratio",
  "cycle_time",
  "listening_rate",
]
categorical_fields = ["coupling_function"]
tag_field = "tags"

[figures]
extensions = [".png", ".jpg", ".jpeg", ".webp", ".pdf", ".svg"]
raster_download_formats = ["png", "jpeg", "webp"]
generated_graph_formats = ["png", "pdf", "svg"]
